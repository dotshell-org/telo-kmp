about:
  screenTitle: "À propos"
  sections:
    - title: "Données de transport"
      content: |
        Les données de transport utilisées dans l’application proviennent exclusivement du site data.grandlyon.com et sont soumises à la Licence Mobilités.

        Les tracés géographiques des lignes de bus (incluant Chrono, Pleine Lune, Bus relais, Gare Express, Navette, Soyeuse, Zone Industrielle et Junior Direct), tramway, Rhônexpress, Trambus, métro, funiculaire et Navigone sont téléchargés directement depuis l’API publique délivrée par le SYTRAL sur le site data.grandlyon.com.

        Les positions géographiques ainsi que les noms des arrêts, les contenus des lignes et les horaires proviennent tous du fichier GTFS (General Transit Feed Specification) distribué par le SYTRAL sur le site data.grandlyon.com. Ces données sont manuellement mises à jour par les développeurs et subissent un prétraitement avant d’être utilisées. Aucune donnée n’est modifiée, uniquement leur organisation est transformée afin d’être traitée plus rapidement par l’application.

        Les pictogrammes des lignes proviennent également du site data.grandlyon.com et sont fournies par le SYTRAL au format SVG.

        Les alertes trafic et les positions de véhicules en temps réel sont fournies par le SYTRAL sur le site data.grandlyon.com via une API fermée requérant une authentification. En vertu de la Licence Mobilités, Dotshell met à disposition du public un miroir de ces données à l’adresse api.dotshell.eu/pelo/v1/. Le miroir fait des requêtes périodiquement à l’API du SYTRAL, enregistre en mémoire le résultat et redistribue au client une copie, accompagnée du timestamp de la dernière mise à jour. Les données sont purement copiées et redistribuées à l’exception des alertes trafic pour lesquelles les bus scolaires Junior Direct ont été fusionnés aux lignes classiques et les doublons ont été supprimés.
      links:
        - label: "data.grandlyon.com"
          url: "https://data.grandlyon.com"
        - label: "api.dotshell.eu/pelo/v1/"
          url: "https://api.dotshell.eu/pelo/v1/"
    - title: "Cartographie"
      content: |
        Les données de cartographie sont fournies par MapLibre et OpenStreetMaps.

        Les fonds de carte (dénommés Positron, Dark Matter, OSM Bright et Liberty) sont fournis par OpenMapTiles. L’application utilise par défaut le thème Positron (Light) de Map Tiler.

        Les tuiles de la vue satellite proviennent de la ESRI World Imagery.
      links:
        - label: "MapLibre"
          url: "https://maplibre.org"
        - label: "OpenStreetMap"
          url: "https://www.openstreetmap.org"
        - label: "OpenMapTiles"
          url: "https://openmaptiles.org"
    - title: "Technologies"
      content: |
        Cette application est développée avec les technologies suivantes :
        • Kotlin et Jetpack Compose pour l'interface utilisateur
        • Hilt pour l'injection de dépendances
        • Retrofit pour les appels réseau
        • MapLibre pour la cartographie
        • Room pour la base de données locale
        • Coroutines pour la programmation asynchrone
      links: []
    - title: "Licence"
      content: |
        Le code source de l’Application est distribué sous licence GPL‑3.0. Pelo n’est pas affilié aux TCL ou au SYTRAL.

        L’application utilise TCL-API-mirror pour le miroir des données en temps réel.
      links:
        - label: "Licence GPL-3.0"
          url: "https://www.gnu.org/licenses/gpl-3.0.html"
        - label: "TCL-API-mirror"
          url: "https://github.com/dotshell/tcl-api-mirror"
  legalSections:
    - title: "Éditeur"
      content: |
        L’Application Pelo est éditée par Dotshell. Dotshell n’est pas affiliée aux TCL ni au SYTRAL. Pour toute question, se référer aux moyens de contact indiqués dans l’Application.
    - title: "Objet"
      content: |
        Les présentes CGU définissent les conditions d’accès et d’utilisation de l’Application Pelo (ci‑après « l’Application »). L’utilisation de l’Application vaut acceptation de ces conditions.
    - title: "Description de l'application"
      content: |
        L’Application aide l’utilisateur à se déplacer dans le réseau TCL (Lyon et agglomération) via des outils de recherche et de planification. Les sources tierces sont listées dans la page « Crédits ».
    - title: "Permissions"
      content: |
        L’Application peut solliciter les permissions suivantes selon les besoins techniques :
        • Localisation : Pour afficher les arrêts proches (traitée localement).
        • Réseau/Internet : Pour récupérer les horaires en temps réel.
    - title: "Traitement des données et confidentialité"
      content: |
        Pelo est conçue selon le principe de la protection des données dès la conception.

        5.1. Stockage Local Exclusif
        L'intégralité de vos données d'usage (historique de recherche, paramètres de l'application, préférences d'affichage) est stockée exclusivement en local sur votre appareil. Dotshell ne dispose d'aucun accès à ces informations.

        5.2. Cas particulier des Favoris (Connexion Socket)
        Pour permettre la mise à jour en temps réel de vos lignes et arrêts favoris, une connexion technique temporaire (socket) est établie à l'ouverture de l'application et rompue dès sa fermeture.
        • Cet échange est strictement anonyme.
        • Aucune donnée permettant de vous identifier n'est transmise ou enregistrée sur un serveur externe.
        • Ce flux sert uniquement à la synchronisation technique des données de transport durant votre session de navigation.

        5.3. Absence de revente
        Dotshell ne collecte, ne vend, ni ne commercialise aucune donnée personnelle. Les requêtes réseau effectuées servent uniquement à interroger les API de transport nécessaires au service (voir page « Crédits »).
    - title: "Responsabilité"
      content: |
        Les informations (horaires, perturbations) sont fournies à titre indicatif. Dotshell décline toute responsabilité en cas d’inexactitude des données provenant de tiers ou d’indisponibilité du réseau de transport.
    - title: "Propriété intellectuelle"
      content: |
        Le code source de l’Application est distribué sous licence GPL‑3.0. Les marques et logos des réseaux de transport demeurent la propriété de leurs titulaires respectifs.
    - title: "Mises à jour"
      content: |
        Dotshell se réserve le droit de modifier ces CGU. La version applicable est celle disponible dans l'Application au moment de son utilisation.
