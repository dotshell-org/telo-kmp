rules:
  strongLines: ["A", "B", "C", "D", "F1", "F2", "RX"]
  strongLineRegexes: ["^T\\d{1,2}$", "^NAVI\\d{1,2}$"]
  lineNameRegexes:
    - "^TB\\d{1,2}[A-Z]?$"
    - "^T\\d{1,2}[A-Z]?$"
    - "^C\\d{1,2}[A-Z]?$"
    - "^NAVI\\d{1,2}$"
    - "^JD\\d{1,3}$"
    - "^GE\\d{1,2}$"
    - "^PL\\d{1,2}$"
    - "^ZI\\d{1,2}$"
    - "^S\\d{1,2}$"
    - "^N\\d{1,2}$"
    - "^\\d{1,3}[A-Z]?$"
  transportTypes:
    - name: "Métro"
      regex: "^[A-D]$"
    - name: "Funiculaire"
      regex: "^F[1-2]$"
    - name: "Tramway"
      regex: "^T\\d{1,2}$"
      icon: "mode_tram"
    - name: "Trambus"
      regex: "^TB\\d{1,2}$"
      icon: "mode_chrono"
    - name: "Chrono"
      regex: "^C\\d{1,2}$"
      icon: "mode_chrono"
    - name: "Bus Scolaire"
      regex: "^JD\\d{1,3}$"
      icon: "mode_jd"
    - name: "Navigone"
      regex: "^NAVI\\d{1,2}$"
    - name: "Navette"
      regex: "^N\\d{1,2}$"
      icon: "mode_bus"
    - name: "Car"
      regex: "^\\d{3}$"
      icon: "mode_bus"
