rules:
  strongLines: ["A", "B", "C", "D", "F1", "F2", "RX"]
  strongLineRegexes: ["^T\\d{1,2}$", "^NAVI\\d{1,2}$"]
  lineNameRegexes:
    - "^TB\\d{1,2}[A-Z]?$"
    - "^T\\d{1,2}[A-Z]?$"
    - "^C\\d{1,2}[A-Z]?$"
    - "^NAVI\\d{1,2}$"
    - "^JD\\d{1,3}$"
    - "^GE\\d{1,2}$"
    - "^PL\\d{1,2}$"
    - "^ZI\\d{1,2}$"
    - "^S\\d{1,2}$"
    - "^N\\d{1,2}$"
    - "^\\d{1,3}[A-Z]?$"
  transportTypes:
    - name: "Métro"
      regex: "^[A-D]$"
    - name: "Funiculaire"
      regex: "^F[1-2]$"
    - name: "Tramway"
      regex: "^T\\d{1,2}$"
      icon: "mode_tram"
    - name: "Trambus"
      regex: "^TB\\d{1,2}$"
      icon: "mode_chrono"
    - name: "Chrono"
      regex: "^C\\d{1,2}$"
      icon: "mode_chrono"
    - name: "Bus Scolaire"
      regex: "^JD\\d{1,3}$"
      icon: "mode_jd"
    - name: "Navigone"
      regex: "^NAVI\\d{1,2}$"
    - name: "Navette"
      regex: "^N\\d{1,2}$"
      icon: "mode_bus"
    - name: "Car"
      regex: "^\\d{3}$"
      icon: "mode_bus"
  aliases:
    - from: "RHONEXPRESS"
      to: "RX"
      matchType: "contains"
    - from: "NAVI1"
      to: "NAV1"
      matchType: "exact"
      equivalents: ["NAVI1", "NAV1"]
      displayAs: "NAVI1"
    - from: "NAV1"
      to: "NAV1"
      matchType: "exact"
      equivalents: ["NAVI1", "NAV1"]
      displayAs: "NAVI1"
  excludedLines: ["T36"]
  vehicleMarkers:
    - prefix: "TB"
      marker: "BUS"
    - prefix: "T"
      marker: "TRAM"
  defaultVehicleMarker: "BUS"

telemetry:
  enabled: true
  endpointUrl: "https://api.dotshell.eu/pelo/v1/telemetry/daily"
  schemaVersion: 1
  networkCode: "lyon-tcl"
  closeDebounceSeconds: 5
  tripSamplingSeconds: 30
  tripSnapRadiusMeters: 100
  profileWindowDays: 30
  disclosure:
    title: "Aidez-nous à améliorer le réseau"
    body: |
      Pour mieux comprendre vos besoins et améliorer le réseau de transport, nous aimerions collecter de manière anonyme :
    items:
      - "Vos heures d'ouverture de l'app (sans aucune donnée d'identification)"
      - "Vos recherches d'arrêts et de lignes"
      - "Les itinéraires que vous calculez et choisissez"
      - "Les arrêts que vous franchissez pendant une navigation"
      - "Vos clics sur les lignes et arrêts"
      - "Les alertes officielles que vous lisez"
      - "Les alertes que vous signalez"
      - "Un profil d'usage anonyme (occasionnel / régulier / intensif + vos 5 lignes habituelles)"
    localOnly:
      - "Vos arrêts favoris (jamais envoyés)"
      - "L'historique détaillé de vos trajets (jamais envoyé)"
    privacyNote: |
      Aucune coordonnée GPS brute n'est envoyée — uniquement les arrêts franchis. L'identifiant change chaque jour, il n'est pas possible de vous suivre dans la durée. Vous pouvez désactiver ce partage à tout moment depuis les réglages.
    faq:
      - question: "Qui reçoit les données ?"
        answer: |
          Les messages sont envoyés au serveur de Dotshell (api.dotshell.eu), opéré pour Pelo. Aucun annonceur ni courtier en données n'y a accès. Des agrégats anonymes peuvent être partagés avec des autorités organisatrices de la mobilité dans une finalité d'amélioration du transport public.
      - question: "Pouvez-vous me suivre dans la durée ?"
        answer: |
          Non. L'identifiant attaché à chaque message change toutes les 24 heures et n'est jamais relié à votre téléphone, à votre numéro ou à un compte. Une fois la journée passée, les messages ne peuvent plus être reconnectés à votre appareil.
      - question: "Pourquoi avez-vous besoin de ma position ?"
        answer: |
          Pendant une navigation, l'application utilise votre position pour trouver l'arrêt le plus proche dans un rayon d'environ 100 mètres. Seul l'identifiant de cet arrêt est conservé — votre position GPS exacte est immédiatement oubliée et ne quitte jamais votre téléphone.
      - question: "Et mes adresses (domicile, travail) ?"
        answer: |
          Vos arrêts favoris et l'historique détaillé de vos trajets restent uniquement sur votre téléphone. Vous pouvez les supprimer à tout moment depuis l'écran « Confidentialité ».
      - question: "Comment je vérifie ce qui est envoyé ?"
        answer: |
          L'écran « Voir les données collectées aujourd'hui » affiche l'intégralité du message en attente d'envoi, en clair. C'est exactement ce qui sera envoyé à la prochaine fermeture de l'app.
      - question: "Si je désactive le partage, qu'arrive-t-il aux données déjà envoyées ?"
        answer: |
          Les agrégats déjà reçus par le serveur ne peuvent pas être retrouvés, car ils ont été attachés à un identifiant journalier qui n'est plus lié à vous. Ils sont purgés automatiquement après 90 jours.
