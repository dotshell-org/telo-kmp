name: iosApp
options:
  bundleIdPrefix: com.pelotcl
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    exactVersion: 6.25.1
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Pelo
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Pelo utilise votre position pour centrer la carte et calculer des itinéraires."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pelotcl.app
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    dependencies:
      - framework: ../app/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework
        embed: false
      - package: MapLibre
        product: MapLibre
    preBuildScripts:
      - name: Build Compose framework (Kotlin/Native)
        basedOnDependencyAnalysis: false
        script: |
          export JAVA_HOME="$HOME/Library/Java/jdk-21.0.11+10/Contents/Home"
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          "$PROJECT_DIR/../gradlew" -p "$PROJECT_DIR/.." :app:linkDebugFrameworkIosSimulatorArm64
    postBuildScripts:
      - name: Copy Compose resources into the app bundle
        basedOnDependencyAnalysis: false
        script: |
          SRC="$PROJECT_DIR/../app/build/generated/compose/resourceGenerator/preparedResources/commonMain/composeResources/files"
          DST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/compose-resources/files"
          if [ -d "$SRC" ]; then
            mkdir -p "$DST"
            rsync -a --delete "$SRC/" "$DST/"
            echo "Copied Compose resources -> $DST"
          else
            echo "warning: Compose resources not found at $SRC"
          fi
